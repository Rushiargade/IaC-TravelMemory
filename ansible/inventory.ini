# Ansible Inventory File
# Update the IP addresses below after running: terraform output

[web]
web-server ansible_host=<WEB_PUBLIC_IP> ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/my-aws-key.pem

[db]
db-server ansible_host=<DB_PRIVATE_IP> ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/my-aws-key.pem ansible_ssh_common_args='-o ProxyJump=ubuntu@<WEB_PUBLIC_IP>'

[all:vars]
ansible_python_interpreter=/usr/bin/python3
